<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Escape Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="startScreen">
    <h1>Escape Game</h1>
    <p class="subtitle">― 謎の部屋から脱出せよ ―</p>

    <div class="buttonArea">
      <button class="menuButton" onclick="startGame()">
          Press Start
      </button>
  
      <button class="menuButton" onclick="openReleaseNotes()">
          Release Notes
      </button>
    </div>
    <p id="version">Version α 0.0.2</p>
  </div>

  <div id="storyScreen" class="hidden">
    <img id="leftCharacter" class="character leftCharacter hidden" src="">
    <img id="rightCharacter" class="character rightCharacter hidden" src="">

    <div id="storyWindow" onclick="nextStory()">
      <div id="speakerName"></div>
      <div id="storyMessage"></div>
      <button id="nextStoryBtn">▼</button>
    </div>
  </div>

  <div id="game" class="hidden">
    <img src="images/first_room.png" id="room" alt="部屋">

    <button class="spot clock" onclick="clickClock()"></button>
    <button class="spot pc" onclick="clickPC()"></button>
    <button class="spot box" onclick="clickBox()"></button>
    <button class="spot syodana" onclick="clickSyodana()"></button>
    <button class="spot door" onclick="clickDoor()"></button>

    <div id="tipsBox">
      <span id="tipsTitle">Tips</span>
      <span id="tipsText">気になる場所をクリックして調べよう。</span>
    </div>
  </div>

  <div id="releaseNotes" class="hidden">
    <div id="releaseNotesBox">
      <button id="releaseCloseBtn" onclick="closeReleaseNotes()">×</button>
  
      <h2>Release Notes</h2>
  
      <h3>Version α 0.0.2</h3>
      <ul>
        <li>会話パートを追加</li>
        <li>左右の立ち絵表示に対応</li>
      </ul>
    </div>
  </div>

  <div id="modal" class="hidden">
    <div id="modalBox">
        <button id="closeBtn" onclick="closeModal()">×</button>
        <img id="modalImage" src="" alt="">
    </div>
</div>

  <script src="js/preload.js"></script>
  <script src="js/data.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/screen.js"></script>
  <script src="js/firstroom.js"></script>
  <script src="js/story.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
