<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Escape Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game">
    <img src="images/first_room.png" id="room" alt="部屋">

    <button class="spot clock" onclick="clickClock()"></button>
    <button class="spot pc" onclick="clickPC()"></button>
    <button class="spot box" onclick="showImage('images/lock_box.jpg')"></button>
    <button class="spot syodana" onclick="showImage('images/warning_goma_shodana.png')"></button>
    <button class="spot door" onclick="showImage('images/warning_goma.png')"></button>
  </div>

  <div id="modal" class="hidden">
    <div id="modalBox">
        <button id="closeBtn" onclick="closeModal()">×</button>
        <img id="modalImage" src="" alt="">
    </div>
</div>

  <script src="script.js"></script>
</body>
</html>
